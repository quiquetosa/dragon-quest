<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Dragon Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #0b1a0b; color: #2ecc71; margin: 0; padding: 20px; }
        h1 { text-shadow: 0 0 10px #2ecc71; }
        
        /* Contenedor de la Bola */
        #contenedor-bola { height: 250px; display: flex; align-items: center; justify-content: center; margin: 20px 0; }
        
        /* Bola de Dragón hecha con CSS (Sin imágenes externas) */
        .bola {
            width: 100px; height: 100px;
            background: radial-gradient(circle at 30% 30%, #ffcc00, #ff8800);
            border-radius: 50%;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.4), 0 0 20px rgba(255, 165, 0, 0.2);
            position: relative;
            transition: all 0.5s ease;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; color: rgba(200, 0, 0, 0.8); /* Color de las estrellas */
        }

        /* Efecto cuando estás MUY CERCA */
        .bola.cerca {
            transform: scale(1.8);
            box-shadow: 0 0 50px #fff700, 0 0 100px #ffaa00;
            animation: latido 1s infinite alternate;
        }

        @keyframes latido {
            from { transform: scale(1.7); }
            to { transform: scale(2.0); }
        }

        .mensaje { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; border: 1px solid #2ecc71; min-height: 50px; }
        button { padding: 15px 30px; font-size: 1.1rem; cursor: pointer; background: #2ecc71; border: none; color: #0b1a0b; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4); }
    </style>
</head>
<body>
    <h1>RADAR DE ENERGÍA</h1>
    
    <div id="contenedor-bola">
        <div id="bola" class="bola">★</div> </div>

    <div class="mensaje" id="status">Pulsa para buscar una señal de energía...</div>
    <br>
    <button onclick="iniciarRadar()">ACTIVAR SENSOR</button>

    <script>
        // --- CONFIGURACIÓN ---
        const tesoroLat = 39.4699; // CAMBIA ESTO
        const tesoroLon = -0.3763; // CAMBIA ESTO
        const radioExito = 15; 
        const radioCerca = 60;

        function iniciarRadar() {
            if (navigator.geolocation) {
                document.getElementById('status').innerHTML = "Buscando satélites...";
                navigator.geolocation.watchPosition(verificarUbicacion, ErrorPosicion, {enableHighAccuracy: true});
            }
        }

        function verificarUbicacion(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            const distancia = calcularDistancia(lat, lon, tesoroLat, tesoroLon);
            
            const bola = document.getElementById('bola');
            const status = document.getElementById('status');

            if (distancia < radioExito) {
                bola.className = "bola cerca";
                status.innerHTML = "¡ESTÁ AQUÍ! ¡HAS LOCALIZADO LA BOLA DE 1 ESTRELLA!";
            } else if (distancia < radioCerca) {
                bola.className = "bola";
                bola.style.transform = "scale(1.4)";
                status.innerHTML = "¡LA SEÑAL ES MUY FUERTE! Estás a " + Math.round(distancia) + " metros.";
            } else {
                bola.className = "bola";
                bola.style.transform = "scale(0.8)";
                bola.style.opacity = "0.5";
                status.innerHTML = "Señal débil... sigue moviéndote.";
            }
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const phi1 = lat1 * Math.PI/180;
            const phi2 = lat2 * Math.PI/180;
            const dPhi = (lat2-lat1) * Math.PI/180;
            const dLambda = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dPhi/2) * Math.sin(dPhi/2) + Math.cos(phi1) * Math.cos(phi2) * Math.sin(dLambda/2) * Math.sin(dLambda/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function ErrorPosicion(err) { alert("Error de GPS: " + err.message); }
    </script>
</body>
</html>
        function ErrorPosicion() { alert("No se puede acceder al GPS. Activa la ubicación."); }
    </script>
</body>
</html>
